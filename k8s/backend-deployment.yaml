apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: surajmane121045/sun_backend_app:b37b240fcbc7cb440fd8da653862de1fe2e2f167
        ports:
        - containerPort: 8080

        env:
        # ConfigMap values
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: all-config
              key: MONGO_DATABASE

        - name: MONGO_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: all-config
              key: MONGO_COLLECTION



        # Secret values
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: all-secret
              key: MONGO_URI

        # - name: PASSWORD
        #   valueFrom:
        #     secretKeyRef:
        #       name: backend-secret
        #       key: APP_PASSWORD