apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: three-tier-ingress
spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:

      # Frontend (React)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080