apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: surajmane121045/sun_frontend_app:b88582f1d0385f4fce445a7df9acfd98e917f5de
        ports:
        - containerPort: 80

        env:
        # ConfigMap values
        - name: VITE_Backend_API_URL
          valueFrom:
            configMapKeyRef:
              name: all_config
              key: VITE_Backend_API_URL