name: Three Tier CI/CD Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # ---------------- Database ----------------
    - name: Build Database Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sun_database_app:${IMAGE_TAG} ./database
        docker push ${{ secrets.DOCKER_USERNAME }}/sun_database_app:${IMAGE_TAG}

    # ---------------- FRONTEND App ----------------
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sun_frontend_app:${IMAGE_TAG} ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/sun_frontend_app:${IMAGE_TAG}

    # ---------------- Backend App ----------------
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sun_backend_app:${IMAGE_TAG} ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/sun_backend_app:${IMAGE_TAG}



    # ---------------- UPDATE K8S MANIFESTS ----------------
    - name: Update Kubernetes Manifests
      run: |
        sed -i "s|image: .*sun_database_app:.*|image: ${{ secrets.DOCKER_USERNAME }}/sun_database_app:${IMAGE_TAG}|g" k8s/mongodb-deployment.yaml
        sed -i "s|image: .*sun_frontend_app:.*|image: ${{ secrets.DOCKER_USERNAME }}/sun_frontend_app:${IMAGE_TAG}|g" k8s/frontend-deployment.yaml
        sed -i "s|image: .*sun_backend_app:.*|image: ${{ secrets.DOCKER_USERNAME }}/sun_backend_app:${IMAGE_TAG}|g" k8s/backend-deployment.yaml

    - name: Commit Updated Manifests
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add k8s/
        git commit -m "Update image tags to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
        git push